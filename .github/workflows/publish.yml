name: Publish Packages

# Publishes all @weavertime/spindle-* packages to npm when a GitHub Release is
# published. Cutting the Release is the single action that both generates the
# changelog (auto-notes — see .github/release.yml) and ships the packages.
#
# Auth is npm Trusted Publishing (OIDC) — there is NO token. Each package must
# have a trusted publisher configured on npmjs.com pointing at this repo and
# this workflow file (Package → Settings → Trusted Publisher). Provenance is
# generated automatically.
#
# Versions come from each package.json — bump them (in lockstep) and commit
# before you tag/release. A package whose version is already on npm is skipped,
# so re-runs and partial bumps are safe.
on:
  release:
    types: [published]
  # Manual fallback (e.g. to retry a failed publish, or publish without a Release).
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC identity for npm trusted publishing (+ provenance)

# Never cancel an in-flight publish.
concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    # Protected environment: publishing waits for a required reviewer's manual
    # approval. Set this same name ("release") as the Environment on each
    # package's npm trusted publisher so npm binds the OIDC token to it.
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest

      - run: npm ci
      # npm ci/install omit Rollup's platform-native optional dep in a workspace
      # root (npm/cli#4828), so `rollup -c` fails to load
      # @rollup/rollup-linux-x64-gnu. Install it explicitly at Rollup's exact
      # version; the runner is always linux-x64. --no-save leaves the lockfile
      # untouched.
      - name: Install Rollup native binary (npm workspace bug workaround)
        run: |
          ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
          npm install --no-save --no-audit --no-fund "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      # Gate before publishing: build (also produces the dist that ships),
      # type-check, and test. Publishing is irreversible, so verify the exact
      # tagged commit is green even though CI already ran on master.
      - run: npm run build
      - run: npm run type-check
      - run: npm test

      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and
      # authenticates via the package's configured trusted publisher.
      - name: Publish changed packages
        run: |
          set -euo pipefail
          published=0
          for dir in packages/*/; do
            pkg="${dir}package.json"
            [ -f "$pkg" ] || continue
            if [ "$(node -p "require('./$pkg').private === true")" = "true" ]; then
              echo "· skip ${dir} (private)"
              continue
            fi
            name="$(node -p "require('./$pkg').name")"
            version="$(node -p "require('./$pkg').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "= $name@$version already on npm — skipping"
            else
              echo "+ publishing $name@$version"
              npm publish -w "$name"
              published=$((published + 1))
            fi
          done
          echo "Published $published package(s)."
