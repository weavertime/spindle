name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  packages:
    name: Packages (build · type-check · test · lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # npm ci/install omit Rollup's platform-native optional dep in a
      # workspace root (npm/cli#4828), so `rollup -c` fails to load
      # @rollup/rollup-linux-x64-gnu. Install it explicitly at Rollup's exact
      # version; the runner is always linux-x64. --no-save leaves the lockfile
      # untouched.
      - name: Install Rollup native binary (npm workspace bug workaround)
        run: |
          ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
          npm install --no-save --no-audit --no-fund "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
      # Build first: cross-package types resolve through each package's built
      # dist/*.d.ts, so type-check must run against a built tree.
      - run: npm run build
      - run: npm run type-check
      - run: npm test
      - run: npm run lint

  website:
    name: Website (type-check · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The website consumes every spindle package via file: deps (local
      # monorepo, pre-publish), so all of their dist must be built before the
      # website resolves them.
      - run: npm ci
      - name: Install Rollup native binary (npm workspace bug workaround)
        run: |
          ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
          npm install --no-save --no-audit --no-fund "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
      - run: npm run build
      - run: npm ci
        working-directory: website
      - run: npm run typecheck
        working-directory: website
      - run: npm run build
        working-directory: website
