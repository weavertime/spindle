name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  packages:
    name: Packages (build · type-check · test · lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Use `npm install`, not `npm ci`: in a workspace root, `npm ci` omits
      # platform-native optional deps (e.g. @rollup/rollup-linux-x64-gnu) —
      # the npm bug in https://github.com/npm/cli/issues/4828. `npm install`
      # reconciles them correctly and still honors the in-sync lockfile.
      - run: npm install --no-audit --no-fund
      # Build first: cross-package types resolve through each package's built
      # dist/*.d.ts, so type-check must run against a built tree.
      - run: npm run build
      - run: npm run type-check
      - run: npm test
      - run: npm run lint

  website:
    name: Website (type-check · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run typecheck
        working-directory: website
      - run: npm run build
        working-directory: website
