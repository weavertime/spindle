# Configures GitHub's auto-generated release notes — the notes produced by the
# "Generate release notes" button and shown on a published Release. Merged PRs
# since the previous release are grouped into these categories by their labels.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - feat
        - enhancement
    - title: 🐛 Fixes
      labels:
        - fix
        - bug
        - bugfix
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
    - title: 🧰 Maintenance & CI
      labels:
        - chore
        - ci
        - build
        - refactor
        - test
        - dependencies
    - title: Other Changes
      labels:
        - '*'
